<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1020" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Hello" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="format-detection" content="telephone=no" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <title>Hello</title>
  <style>
    :root{
      --bg:#08101f;
      --bg2:#121d36;
      --card:rgba(255,255,255,.09);
      --line:rgba(255,255,255,.14);
      --text:#f8fbff;
      --muted:rgba(248,251,255,.72);
      --glow:rgba(97,168,255,.33);
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{
      width:100%;height:100%;margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,sans-serif;
      background:
        radial-gradient(1000px 600px at 20% 10%, rgba(89,161,255,.22), transparent 45%),
        radial-gradient(800px 500px at 90% 90%, rgba(255,255,255,.10), transparent 36%),
        linear-gradient(180deg,var(--bg),var(--bg2));
      color:var(--text);
      overflow:hidden;
    }
    body{
      display:grid;place-items:center;
      padding:calc(env(safe-area-inset-top) + 20px) 20px calc(env(safe-area-inset-bottom) + 20px);
    }
    .noise,.orb,.orb2,.orb3{position:fixed;inset:auto;pointer-events:none}
    .noise{
      inset:0;opacity:.06;
      background-image:
        radial-gradient(circle at 25% 25%, white 0 1px, transparent 1px),
        radial-gradient(circle at 75% 75%, white 0 1px, transparent 1px);
      background-size:22px 22px, 19px 19px;
      mix-blend-mode:soft-light;
    }
    .orb{
      width:240px;height:240px;border-radius:50%;
      top:8%;left:4%;
      background:var(--glow);filter:blur(40px);
      animation:float1 9s ease-in-out infinite;
    }
    .orb2{
      width:280px;height:280px;border-radius:50%;
      right:-40px;bottom:2%;
      background:rgba(255,255,255,.08);filter:blur(46px);
      animation:float2 11s ease-in-out infinite;
    }
    .orb3{
      width:120px;height:120px;border-radius:50%;
      right:18%;top:18%;
      background:rgba(121,188,255,.16);filter:blur(24px);
      animation:float3 8s ease-in-out infinite;
    }
    .shell{
      position:relative;z-index:2;
      width:min(100%,430px);
      transform:translateY(14px);
      opacity:0;
      animation:enter .9s cubic-bezier(.2,.8,.2,1) .1s forwards;
    }
    .card{
      position:relative;
      padding:28px 22px 24px;
      border-radius:34px;
      background:linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,.06));
      border:1px solid var(--line);
      box-shadow:0 20px 80px rgba(0,0,0,.32), inset 0 1px 0 rgba(255,255,255,.14);
      backdrop-filter:blur(24px) saturate(160%);
      -webkit-backdrop-filter:blur(24px) saturate(160%);
      overflow:hidden;
    }
    .card::before{
      content:"";
      position:absolute;inset:-1px;
      background:linear-gradient(135deg, rgba(255,255,255,.25), transparent 22%, transparent 78%, rgba(255,255,255,.10));
      mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      mask-composite:exclude;
      -webkit-mask-composite:xor;
      padding:1px;
      border-radius:34px;
      pointer-events:none;
    }
    .status{
      display:flex;align-items:center;justify-content:space-between;
      margin-bottom:34px;font-size:.78rem;color:var(--muted);letter-spacing:.02em;
    }
    .dots{display:flex;gap:6px}
    .dot{width:8px;height:8px;border-radius:999px;background:rgba(255,255,255,.18)}
    .eyebrow{
      margin:0 0 10px;
      font-size:.78rem;font-weight:700;letter-spacing:.16em;
      color:rgba(255,255,255,.58);
    }
    h1{
      margin:0;
      font-size:clamp(2.4rem, 14vw, 4.5rem);
      line-height:.9;
      letter-spacing:-.07em;
      font-weight:800;
    }
    .gradient{
      background:linear-gradient(135deg, #ffffff 0%, #b4d4ff 68%, #7ab7ff 100%);
      -webkit-background-clip:text;background-clip:text;color:transparent;
    }
    .desc{
      margin:16px 0 0;
      line-height:1.58;
      color:var(--muted);
      font-size:.98rem;
      max-width:28ch;
    }
    .pill{
      margin-top:24px;
      display:inline-flex;align-items:center;gap:10px;
      min-height:48px;padding:0 16px;
      border-radius:999px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.14);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.10);
      color:#fff;font-weight:600;font-size:.94rem;
    }
    .spark{
      width:10px;height:10px;border-radius:999px;
      background:linear-gradient(180deg,#fff,#8bc0ff);
      box-shadow:0 0 18px rgba(139,192,255,.9);
    }
    .hint{
      margin-top:14px;
      text-align:center;
      font-size:.82rem;
      color:rgba(255,255,255,.54);
    }
    .splash{
      position:fixed; inset:0; z-index:10;
      display:grid; place-items:center;
      background:
        radial-gradient(800px 500px at 50% 20%, rgba(88,161,255,.26), transparent 40%),
        linear-gradient(180deg,#09111f,#0e1930);
      animation:fadeSplash 1.15s ease forwards;
    }
    .splash-logo{
      width:108px;height:108px;border-radius:28px;
      background:linear-gradient(180deg,#1e3d7d,#0d1c41);
      border:1px solid rgba(255,255,255,.12);
      box-shadow:0 18px 50px rgba(0,0,0,.32), inset 0 1px 0 rgba(255,255,255,.12);
      display:grid;place-items:center;
      color:#fff;font-size:42px;font-weight:800;letter-spacing:-.06em;
      animation:logoIn .7s cubic-bezier(.2,.8,.2,1);
    }
    @keyframes enter{to{opacity:1;transform:none}}
    @keyframes fadeSplash{
      0%,70%{opacity:1;visibility:visible}
      100%{opacity:0;visibility:hidden}
    }
    @keyframes logoIn{
      0%{transform:scale(.84);opacity:0}
      100%{transform:scale(1);opacity:1}
    }
    @keyframes float1{
      0%,100%{transform:translate(0,0)}
      50%{transform:translate(16px,22px)}
    }
    @keyframes float2{
      0%,100%{transform:translate(0,0)}
      50%{transform:translate(-18px,-14px)}
    }
    @keyframes float3{
      0%,100%{transform:translate(0,0)}
      50%{transform:translate(10px,-12px)}
    }
  </style>
</head>
<body>
  <div class="splash" aria-hidden="true">
    <div class="splash-logo">H</div>
  </div>
  <div class="noise"></div>
  <div class="orb"></div>
  <div class="orb2"></div>
  <div class="orb3"></div>

  <main class="shell">
    <section class="card">
      <div class="status">
        <span>Hello App</span>
        <div class="dots" aria-hidden="true"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
      </div>
      <p class="eyebrow">MINIMAL PWA</p>
      <h1><span class="gradient">Hello,</span><br>world!</h1>
      <p class="desc">아이폰 Safari에서 이 페이지를 열고 홈 화면에 추가하면, 앱처럼 바로 실행되는 깔끔한 웹앱입니다.</p>
      <div class="pill"><span class="spark"></span> 홈 화면에 추가해서 사용</div>
    </section>
    <div class="hint">Safari 공유 버튼 → 홈 화면에 추가</div>
  </main>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
