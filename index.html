<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#071325" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Hello App" />
  <meta name="format-detection" content="telephone=no" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <title>Hello App</title>
  <style>
    :root {
      --bg-top: #081a3b;
      --bg-mid: #112c63;
      --bg-bottom: #031126;
      --card: rgba(54, 79, 137, 0.44);
      --card-line: rgba(255, 255, 255, 0.10);
      --text: #f4f7ff;
      --muted: rgba(240, 244, 255, 0.82);
      --subtle: rgba(240, 244, 255, 0.54);
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.22);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      height: -webkit-fill-available;
      background:
        radial-gradient(circle at 14% 14%, rgba(149, 181, 255, 0.34), transparent 24%),
        radial-gradient(circle at 82% 82%, rgba(101, 131, 225, 0.22), transparent 20%),
        linear-gradient(180deg, var(--bg-top) 0%, var(--bg-mid) 54%, #08204a 72%, var(--bg-bottom) 100%);
      background-color: var(--bg-bottom);
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      min-height: -webkit-fill-available;
      width: 100%;
      position: relative;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 14% 14%, rgba(149, 181, 255, 0.34), transparent 24%),
        radial-gradient(circle at 82% 82%, rgba(101, 131, 225, 0.22), transparent 20%),
        linear-gradient(180deg, var(--bg-top) 0%, var(--bg-mid) 54%, #08204a 72%, var(--bg-bottom) 100%);
      background-color: var(--bg-bottom);
      padding:
        calc(env(safe-area-inset-top) + 28px)
        22px
        calc(env(safe-area-inset-bottom) + 42px)
        22px;
      display: grid;
      place-items: center;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    body::before {
      background:
        radial-gradient(circle at 20% 18%, rgba(182, 202, 255, 0.18), transparent 18%),
        radial-gradient(circle at 74% 78%, rgba(164, 182, 255, 0.16), transparent 18%),
        radial-gradient(circle at 88% 20%, rgba(42, 74, 145, 0.16), transparent 16%);
      filter: blur(6px);
      opacity: 0.95;
    }

    body::after {
      background:
        linear-gradient(180deg, transparent 0%, transparent 60%, rgba(2, 12, 27, 0.16) 76%, rgba(2, 10, 24, 0.44) 90%, rgba(1, 8, 20, 0.72) 100%),
        radial-gradient(ellipse at bottom, rgba(13, 32, 70, 0.38) 0%, rgba(3, 12, 29, 0) 56%);
      mix-blend-mode: normal;
    }

    .bg-orb {
      position: fixed;
      border-radius: 999px;
      filter: blur(22px);
      pointer-events: none;
      opacity: 0.82;
      z-index: 0;
    }

    .bg-orb.one {
      width: 180px;
      height: 180px;
      top: 7%;
      left: 0;
      background: rgba(158, 185, 255, 0.24);
    }

    .bg-orb.two {
      width: 220px;
      height: 220px;
      right: -26px;
      bottom: 10%;
      background: rgba(119, 149, 255, 0.16);
    }

    .shell {
      position: relative;
      z-index: 1;
      width: min(100%, 430px);
    }

    .card {
      position: relative;
      border-radius: 34px;
      padding: 30px 28px 28px;
      background: linear-gradient(180deg, rgba(86, 111, 171, 0.28), rgba(49, 73, 126, 0.36));
      border: 1px solid var(--card-line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(22px) saturate(130%);
      -webkit-backdrop-filter: blur(22px) saturate(130%);
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0.02) 34%, transparent 55%);
      pointer-events: none;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
      position: relative;
      z-index: 1;
    }

    .appname {
      margin: 0;
      font-size: 0.84rem;
      letter-spacing: -0.02em;
      color: var(--muted);
      font-weight: 500;
    }

    .dots {
      display: flex;
      gap: 10px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(214, 225, 255, 0.24);
    }

    .eyebrow {
      margin: 0 0 18px;
      font-size: 0.86rem;
      letter-spacing: 0.16em;
      font-weight: 700;
      color: rgba(242, 245, 255, 0.66);
    }

    h1 {
      margin: 0;
      font-size: clamp(4.2rem, 15vw, 5.4rem);
      line-height: 0.88;
      letter-spacing: -0.09em;
      font-weight: 800;
      text-wrap: balance;
    }

    .desc {
      margin: 26px 0 0;
      font-size: 1rem;
      line-height: 1.58;
      letter-spacing: -0.02em;
      color: var(--muted);
      max-width: 20ch;
      word-break: keep-all;
    }

    .cta {
      margin-top: 28px;
      display: inline-flex;
      align-items: center;
      gap: 14px;
      padding: 14px 22px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.10);
      background: linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.05));
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.16), 0 10px 20px rgba(9, 18, 40, 0.16);
      color: var(--text);
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      text-decoration: none;
      user-select: none;
    }

    .cta-badge {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #dce8ff, #9ebeff 68%, #7d9ae0 100%);
      box-shadow: 0 0 0 6px rgba(171, 194, 255, 0.10);
      flex: none;
    }

    .footer {
      text-align: center;
      margin-top: 22px;
      color: var(--subtle);
      font-size: 0.84rem;
      letter-spacing: -0.02em;
      position: relative;
      z-index: 1;
    }

    @media (max-width: 390px) {
      body {
        padding-left: 18px;
        padding-right: 18px;
      }
      .card {
        padding: 26px 22px 24px;
        border-radius: 30px;
      }
      h1 {
        font-size: clamp(3.7rem, 15vw, 4.6rem);
      }
    }
  </style>
</head>
<body>
  <div class="bg-orb one"></div>
  <div class="bg-orb two"></div>

  <main class="shell">
    <section class="card">
      <div class="topbar">
        <p class="appname">Hello App</p>
        <div class="dots" aria-hidden="true">
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>
      </div>

      <p class="eyebrow">MINIMAL PWA</p>
      <h1>Hello,<br />world!</h1>
      <p class="desc">아이폰 Safari에서 이 페이지를 열고 홈 화면에 추가하면, 앱처럼 바로 실행되는 깔끔한 웹앱입니다.</p>
      <div class="cta"><span class="cta-badge"></span>홈 화면에 추가해서 사용</div>
    </section>

    <div class="footer">Safari 공유 버튼 → 홈 화면에 추가</div>
  </main>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
